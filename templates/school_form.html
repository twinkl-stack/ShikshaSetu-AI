<!DOCTYPE html>
<html>
<head>
    <title>School Student Form</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <h1>🎒 School Student Registration</h1>

    <form action="/dashboard" method="GET">

        <label>Student Name:</label>
        <input type="text" name="name" required>

        <br><br>

        <label>Select Class:</label>
        <select id="student_class" name="student_class">

            <option>Class 1</option>
            <option>Class 2</option>
            <option>Class 3</option>
            <option>Class 4</option>
            <option>Class 5</option>
            <option>Class 6</option>
            <option>Class 7</option>
            <option>Class 8</option>
            <option>Class 9</option>
            <option>Class 10</option>
            <option>Class 11</option>
            <option>Class 12</option>

        </select>

        <br><br>
        
        <label id="stream_label">Select Stream:</label>
        <select id="stream" name="stream">
            <option>Science</option>
            <option>Commerce</option>
            <option>Arts</option>
        </select>
        <br><br>
        <label>Select Subject:</label>

        <select id="subject" name="subject">
            <option>Select Subject</option>
        </select>

        <br><br>
        <input type="hidden" name="student_type" value="school">
        <p style="color:gray;">
            Choose your class and subject to get a personalized AI learning experience.
        </p>
        <button type="submit">
            🚀 Start Learning 
        </button>
    
    </form>
    <script>
    const streamLabel = document.getElementById("stream_label");
    const studentClass = document.getElementById("student_class");
    const stream = document.getElementById("stream");
    const subject = document.getElementById("subject");

    function updateSubjects(){

        subject.innerHTML = "";

        const cls = studentClass.value;

        // Hide stream for Class 1-10
        if(
            cls === "Class 1" ||
            cls === "Class 2" ||
            cls === "Class 3" ||
            cls === "Class 4" ||
            cls === "Class 5" ||
            cls === "Class 6" ||
            cls === "Class 7" ||
            cls === "Class 8" ||
            cls === "Class 9" ||
            cls === "Class 10"
       ){

            stream.style.display = "none";
            streamLabel.style.display = "none";
            if(
                cls==="Class 1"||
                cls==="Class 2"||
                cls==="Class 3"||
                cls==="Class 4"||
                cls==="Class 5"||
                cls==="Class 6"||
                cls==="Class 7"||
                cls==="Class 8"
            ){

                subject.innerHTML=`
                <option>English</option>
                <option>Mathematics</option>
                <option>Science</option>
                <option>History</option>
                <option>Geography</option>
                <option>Civics</option>
                `;

            }

            else{

                subject.innerHTML=`
                <option>English</option>
                <option>Mathematics</option>
                <option>Physics</option>
                <option>Chemistry</option>
                <option>Biology</option>
                <option>History</option>
                <option>Geography</option>
                <option>Political Science</option>
                <option>Economics</option>
                `;

            }

        }

        else{

            stream.style.display = "inline";
            streamLabel.style.display = "inline";
            if(stream.value==="Science"){

               subject.innerHTML=`
               <option value="">Select Subject</option>
               <option>Physics</option>
               <option>Chemistry</option>
               <option>Biology</option>
               <option>Mathematics</option>
               <option>Computer Science</option>
               <option>English</option>
               `;

            }

            else if(stream.value==="Commerce"){

                subject.innerHTML=`
                <option>Accountancy</option>
                <option>Business Studies</option>
                <option>Economics</option>
                <option>Mathematics</option>
                <option>English</option>
                `;

            }

            else{

                subject.innerHTML=`
                <option>History</option>
                <option>Political Science</option>
                <option>Geography</option>
                <option>Economics</option>
                <option>Psychology</option>
                <option>English</option>
                `;

            }

        }

    }

    studentClass.addEventListener("change", updateSubjects);
    stream.addEventListener("change", updateSubjects);

    updateSubjects();

    </script>
    
</body>
</html>
