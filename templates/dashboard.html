<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Dashboard | ShikshaSetu AI</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='dashboard.css') }}">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<!-- ================= NAVBAR ================= -->

<nav class="dashboard-navbar">

    <div class="logo">
        🎓 <span>ShikshaSetu AI</span>
    </div>

    <div class="profile">

        <span>👋 Welcome, Twinkle</span>

        <a href="/logout">

            <button>Logout</button>

        </a>

    </div>

</nav>

<!-- ================= HERO ================= -->

<section class="dashboard-hero">

    <div>

        <h1>Good Evening 👋</h1>

        <p>Let's continue your learning journey.</p>

    </div>

</section>

<!-- ================= STATS ================= -->

<section class="stats">

    <div class="stat-card">

        <h2>⭐ XP</h2>

        <h1>250</h1>

    </div>

    <div class="stat-card">

        <h2>🔥 Streak</h2>

        <h1>7 Days</h1>

    </div>

    <div class="stat-card">

        <h2>📚 Tests</h2>

        <h1>18</h1>

    </div>

    <div class="stat-card">

        <h2>🏆 Level</h2>

        <h1>4</h1>

    </div>

</section>

<!-- ================= TOOLS ================= -->

<section class="tools">

    <h2>Your Learning Tools</h2>

    <div class="tool-grid">

        <a href="/">

            <div class="tool-card">

                🤖

                <h3>AI Tutor</h3>

            </div>

        </a>

        <a href="/">

            <div class="tool-card">

                📷

                <h3>Image Solver</h3>

            </div>

        </a>

        <a href="/">

            <div class="tool-card">

                📝

                <h3>Mock Test</h3>

            </div>

        </a>

        <a href="/">

            <div class="tool-card">

                📚

                <h3>Notes</h3>

            </div>

        </a>

        <a href="/">

            <div class="tool-card">

                📅

                <h3>Study Planner</h3>

            </div>

        </a>

        <a href="/">

            <div class="tool-card">

                📈

                <h3>Progress</h3>

            </div>

        </a>

    </div>

</section>

</body>

</html>
